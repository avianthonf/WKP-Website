name: CI and Vercel Deploy

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: vercel-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build admin
        run: npm run build --workspace apps/admin

      - name: Build storefront
        run: npm run build --workspace apps/storefront

  deploy:
    name: Deploy to Vercel
    needs: build
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: admin
            path: apps/admin
            project_secret: VERCEL_ADMIN_PROJECT_ID
          - app: storefront
            path: apps/storefront
            project_secret: VERCEL_STOREFRONT_PROJECT_ID
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets[matrix.project_secret] }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Pull Vercel environment
        working-directory: ${{ matrix.path }}
        run: npx --yes vercel@latest pull --yes --environment=${{ github.event_name == 'push' && 'production' || 'preview' }} --token=${{ env.VERCEL_TOKEN }}

      - name: Build Vercel project
        working-directory: ${{ matrix.path }}
        run: npx --yes vercel@latest build --token=${{ env.VERCEL_TOKEN }}

      - name: Deploy preview
        if: github.event_name == 'pull_request'
        working-directory: ${{ matrix.path }}
        run: npx --yes vercel@latest deploy --prebuilt --token=${{ env.VERCEL_TOKEN }}

      - name: Deploy production
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: ${{ matrix.path }}
        run: npx --yes vercel@latest deploy --prebuilt --prod --token=${{ env.VERCEL_TOKEN }}
